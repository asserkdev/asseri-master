<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asseri Modular AI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <h1>Asseri AI</h1>
        <p>Modular Learning System</p>
      </div>
      <section class="panel">
        <h2>Account</h2>
        <p id="authState" class="auth-state">Signed out</p>
        <form id="authForm" class="auth-form">
          <input id="authUsername" type="text" placeholder="Username" autocomplete="username" required />
          <input id="authPassword" type="password" placeholder="Password" autocomplete="current-password" required />
          <div class="auth-actions">
            <button id="signInBtn" class="btn primary" type="submit">Sign In</button>
            <button id="signUpBtn" class="btn" type="button">Sign Up</button>
            <button id="signOutBtn" class="btn hidden" type="button">Sign Out</button>
          </div>
        </form>
      </section>
      <button id="newSessionBtn" class="btn primary">New Session</button>
      <section class="panel">
        <h2>Sessions</h2>
        <ul id="sessionsList" class="sessions-list"></ul>
      </section>
    </aside>

    <main class="chat-shell">
      <header class="chat-header">
        <h2 id="chatTitle">Session</h2>
        <div class="chat-header-meta">
          <span id="authBadge" class="auth-badge">Signed out</span>
          <span id="statusText">Ready</span>
        </div>
      </header>

      <section id="messages" class="messages"></section>
      <div id="loadingRow" class="loading-row hidden">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>

      <form id="chatForm" class="composer">
        <input id="messageInput" type="text" placeholder="Ask anything..." autocomplete="off" required />
        <button class="btn primary" type="submit">Send</button>
      </form>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
