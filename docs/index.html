<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asseri Modular AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">
          <img id="brandLogo" src="./logo.png" alt="Asseri AI logo" />
        </div>
      </div>

      <section class="panel profile-panel">
        <h2>Profile</h2>
        <button id="profileCard" class="profile-card" type="button">
          <span id="profileAvatar" class="profile-avatar">G</span>
          <span class="profile-main">
            <strong id="profileDisplayName">Guest</strong>
            <span id="profileHint">Click to open profile details</span>
          </span>
          <span class="profile-caret">v</span>
        </button>
        <div id="profileDetails" class="profile-details hidden">
          <label for="profileEmail">Email</label>
          <input id="profileEmail" type="email" placeholder="name@example.com" />
          <label for="profileNotes">Notes</label>
          <textarea id="profileNotes" rows="3" placeholder="Add notes about this user profile..."></textarea>
          <button id="saveProfileBtn" class="btn" type="button">Save Profile Notes</button>
        </div>
      </section>

      <section class="panel">
        <h2>Account</h2>
        <p id="authState" class="auth-state">Signed out</p>
        <form id="authForm" class="auth-form">
          <input id="authUsername" type="text" placeholder="Username" autocomplete="username" required />
          <input id="authPassword" type="password" placeholder="Password" autocomplete="current-password" required />
          <div class="auth-actions">
            <button id="signInBtn" class="btn primary" type="submit">Sign In</button>
            <button id="signUpBtn" class="btn" type="button">Sign Up</button>
            <button id="signOutBtn" class="btn hidden" type="button">Sign Out</button>
          </div>
        </form>
      </section>
      <button id="newSessionBtn" class="btn primary">New Session</button>

      <section class="panel">
        <h2>Preferences</h2>
        <label class="toggle-row" for="toggleConfidence">
          <span>Confidence Bar</span>
          <input id="toggleConfidence" type="checkbox" checked />
          <span class="toggle-ui"></span>
        </label>
        <label class="toggle-row" for="toggleCompact">
          <span>Compact Messages</span>
          <input id="toggleCompact" type="checkbox" />
          <span class="toggle-ui"></span>
        </label>
        <label class="toggle-row" for="toggleAutoscroll">
          <span>Auto Scroll</span>
          <input id="toggleAutoscroll" type="checkbox" checked />
          <span class="toggle-ui"></span>
        </label>
      </section>

      <section class="panel">
        <h2>Style</h2>
        <div class="tone-row">
          <label for="toneSelect">Tone</label>
          <select id="toneSelect">
            <option value="friendly">Friendly</option>
            <option value="formal">Formal</option>
            <option value="casual">Casual</option>
            <option value="chill">Chill</option>
            <option value="direct">Direct</option>
          </select>
          <button id="applyToneBtn" class="btn" type="button">Apply Tone</button>
        </div>
      </section>
      <section class="panel connection-panel">
        <h2>Connection</h2>
        <p><strong>Web (GitHub):</strong> <a href="https://asserkdev.github.io/asseri-master/" target="_blank"
            rel="noopener noreferrer">asserkdev.github.io/asseri-master</a></p>
        <p><strong>Web (Firebase):</strong> <a href="https://asseri-1.web.app" target="_blank"
            rel="noopener noreferrer">asseri-1.web.app</a></p>
        <p><strong>API:</strong> <a href="https://asseri--asserkdev.replit.app" target="_blank"
            rel="noopener noreferrer">asseri--asserkdev.replit.app</a></p>
        <p class="connection-tip">Override backend with <code>?api=https://your-backend-url</code></p>
      </section>
      <section class="panel">
        <h2>Sessions</h2>
        <ul id="sessionsList" class="sessions-list"></ul>
      </section>
    </aside>

    <main class="chat-shell">
      <header class="chat-header">
        <h2 id="chatTitle">Session</h2>
        <div class="chat-header-meta">
          <span id="authBadge" class="auth-badge">Signed out</span>
          <span id="safetyBadge" class="safety-badge">Safety: Normal</span>
          <span id="statusText">Ready</span>
        </div>
      </header>

      <section class="chat-tools">
        <div class="tool-group">
          <button id="continueBtn" class="btn" type="button">Continue</button>
          <button id="regenerateBtn" class="btn" type="button">Regenerate</button>
          <button id="exportBtn" class="btn" type="button">Export</button>
          <button id="deleteSessionBtn" class="btn danger" type="button">Delete Chat</button>
        </div>
        <div class="tool-group">
          <button id="profileBtn" class="btn" type="button">Profile Facts</button>
          <button id="pinsBtn" class="btn" type="button">Pins</button>
          <button id="tagsBtn" class="btn" type="button">Tags</button>
          <input id="searchInput" type="text" placeholder="Search this chat..." />
          <button id="searchBtn" class="btn" type="button">Search</button>
        </div>
      </section>

      <section id="messages" class="messages"></section>
      <div id="loadingRow" class="loading-row hidden">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <form id="chatForm" class="composer">
        <input id="messageInput" type="text" placeholder="Ask anything..." autocomplete="off" required />
        <button class="btn primary" type="submit">Send</button>
      </form>
    </main>
  </div>

  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script defer src="firebase-init.js"></script>
  <script defer src="app.js"></script>
</body>

</html>
